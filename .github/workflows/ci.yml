name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace
        run: uv sync --all-packages

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy — shared
        run: uv run mypy shared/src

      - name: Mypy — semantic-validator
        run: uv run mypy packages/semantic-validator/src

  test-semantic:
    name: Tests — semantic-validator
    runs-on: ubuntu-latest
    needs: lint
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace
        run: uv sync --all-packages

      - name: Run tests
        run: uv run pytest packages/semantic-validator/tests -v --cov=datasentinel_semantic --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: semantic-validator

  test-agent:
    name: Tests — pipeline-agent
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: datasentinel
          POSTGRES_PASSWORD: datasentinel
          POSTGRES_DB: datasentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      POSTGRES_HOST: localhost
      POSTGRES_USER: datasentinel
      POSTGRES_PASSWORD: datasentinel
      POSTGRES_DB: datasentinel
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace
        run: uv sync --all-packages

      - name: Run tests
        run: uv run pytest packages/pipeline-agent/tests -v

  test-stream:
    name: Tests — stream-monitor
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace
        run: uv sync --all-packages

      - name: Run tests
        run: uv run pytest packages/stream-monitor/tests -v
