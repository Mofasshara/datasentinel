name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - datasentinel-semantic
          - datasentinel-stream

jobs:
  publish-semantic:
    name: Publish datasentinel-semantic
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.package == 'datasentinel-semantic')
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing — no API token needed
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace
        run: uv sync --all-packages

      - name: Run tests before publish
        run: uv run pytest packages/semantic-validator/tests -v

      - name: Build wheel + sdist
        run: |
          cd packages/semantic-validator
          uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/semantic-validator/dist/

  publish-stream:
    name: Publish datasentinel-stream
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.package == 'datasentinel-stream')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace
        run: uv sync --all-packages

      - name: Run tests before publish
        run: uv run pytest packages/stream-monitor/tests -v

      - name: Build wheel + sdist
        run: |
          cd packages/stream-monitor
          uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/stream-monitor/dist/
