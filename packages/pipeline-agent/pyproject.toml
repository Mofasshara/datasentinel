[project]
name = "datasentinel-agent"
version = "0.1.0"
description = "Self-healing pipeline agent — agentic root cause analysis and remediation"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasentinel-shared",
    "langgraph>=0.2",
    "langchain-anthropic>=0.2",
    "duckdb>=1.0",
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
    "httpx>=0.27",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "streamlit>=1.35",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datasentinel_agent"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
