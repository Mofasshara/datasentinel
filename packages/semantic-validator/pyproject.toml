[project]
name = "datasentinel-semantic"
version = "0.1.0"
description = "Semantic data quality validator for AI-generated pipeline records"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["data-quality", "llm", "semantic-validation", "ai-pipeline", "great-expectations"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Quality Assurance",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "datasentinel-shared",
    "pandas>=2.0",
    "sentence-transformers>=3.0",
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
    "numpy>=1.26",
    "scikit-learn>=1.4",
    "spacy>=3.7",
]

[project.optional-dependencies]
gx = ["great-expectations>=1.0"]
dbt = ["dbt-core>=1.8"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datasentinel_semantic"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
